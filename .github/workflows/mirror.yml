name: Mirror Repo

on:
  push:
    branches:
      - main
      - dev

concurrency:
  group: mirror
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to mirror repo
        env:
          TOKEN: ${{ secrets.PERSONAL_DEPLOY_TOKEN }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git remote add mirror https://x-access-token:${TOKEN}@github.com/anshulkardam2910/alpha-frontend.git

          git push mirror HEAD:${{ github.ref_name }} --force
